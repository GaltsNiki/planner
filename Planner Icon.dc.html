<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
</style>
</helmet>

<div style="width:1024px;height:1024px;border-radius:224px;background:#E3DACC;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
  <div style="transform:scale(1.42);width:404px;height:520px;background:#FBF7EF;border-radius:20px;box-shadow:0 30px 70px rgba(60,35,15,0.22),0 4px 12px rgba(60,35,15,0.12);position:relative;overflow:hidden">
    <!-- ruled lines -->
    <div style="position:absolute;left:0;right:0;top:118px;height:2px;background:#E7DECE"></div>
    <div style="position:absolute;left:0;right:0;top:190px;height:2px;background:#E7DECE"></div>
    <div style="position:absolute;left:0;right:0;top:262px;height:2px;background:#E7DECE"></div>
    <div style="position:absolute;left:0;right:0;top:334px;height:2px;background:#E7DECE"></div>
    <div style="position:absolute;left:0;right:0;top:406px;height:2px;background:#E7DECE"></div>
    <!-- list items sitting on the ruled lines -->
    <div style="position:absolute;left:96px;right:44px;top:82px;display:flex;align-items:center;gap:22px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#C15F3C" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>
      <div style="flex:1;height:11px;border-radius:6px;background:#D8CDBB"></div>
    </div>
    <div style="position:absolute;left:96px;right:44px;top:154px;display:flex;align-items:center;gap:22px">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#C15F3C" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>
      <div style="flex:1;height:11px;border-radius:6px;background:#D8CDBB"></div>
    </div>
    <div style="position:absolute;left:96px;right:44px;top:226px;display:flex;align-items:center;gap:22px">
      <div style="width:26px;height:26px;border-radius:7px;border:3px solid #D3C7B4;flex:none"></div>
      <div style="flex:1;height:11px;border-radius:6px;background:#E7DECE"></div>
    </div>
    <div style="position:absolute;left:96px;right:80px;top:298px;display:flex;align-items:center;gap:22px">
      <div style="width:26px;height:26px;border-radius:7px;border:3px solid #D3C7B4;flex:none"></div>
      <div style="flex:1;height:11px;border-radius:6px;background:#E7DECE"></div>
    </div>
  </div>

  <!-- pencil resting across the page -->
  <div style="position:absolute;right:96px;top:50%;transform:translateY(-50%) rotate(180deg) scale(1.42);transform-origin:center;filter:drop-shadow(0 -16px 22px rgba(60,35,15,0.28))">
    <svg width="64" height="470" viewBox="0 0 64 470" fill="none">
      <!-- body -->
      <path d="M16 400 V66 a16 16 0 0 1 32 0 V400 z" fill="#F0ECE3"/>
      <!-- sharpened tip -->
      <path d="M16 400 L32 452 L48 400 z" fill="#E6DFCD"/>
      <!-- graphite point -->
      <path d="M25 434 L32 452 L39 434 z" fill="#1A1915"/>
    </svg>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1024,&quot;height&quot;:1024}}"></script>
</body>
</html>
